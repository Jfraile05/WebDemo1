<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="cursor-dot" aria-hidden="true"></div>

  <nav id="nav">

      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#experience">Experience</a></li>

        <li><a href="#skills">Skills</a></li>
        <li><a href="#hobbies">Interests</a></li>
        <li><a href="#contact">Contact</a></li>

        <span class="status-dot"></span>
        <span class="status-text">Available</span>
      </div>
    </div>
  </nav>

  <main>
    <section id="hero"></section>
    <section id="about"></section>
    <section id="experience"></section>
    <section id="projects"></section>
    <section id="leadership"></section>
    <section id="skills"></section>
    <section id="hobbies"></section>

  <button id="edit-toggle" title="Toggle edit mode" aria-label="Toggle edit mode">
    <span class="edit-icon">✏️</span>
    <span class="lock-icon">🔒</span>
  </button>

  <div id="edit-toast" class="toast"></div>

  <script src="app.js"></script>
