<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jorge Fraile Perez</title>
  <meta name="description" content="Jorge Fraile Perez. Founding Engineer at Drafted Labs, AWS Student Builder Campus Leader, and CS student at Florida State University. Ask me anything." />
  <link rel="icon" href="jorge.jpeg" />
  <style>
  /* Committed dark design: the neon fluid needs a black ground */
  :root {
    --bg: #050507;
    --fg: #F4F4F5;
    --card: #16161B;
    --glass: rgba(16, 16, 21, 0.55);
    --border: #2A2A31;
    --border-soft: #232329;
    --muted-fg: #A1A1AA;
    --placeholder: #71717A;
    --accent: #D4B886;
    --accent-soft: #2B2517;
    --tag-bg: #26262C;
    --handle: #3F3F46;
    --link: #D4B886;
    --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.45);
    --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.55);
    --shadow-img: 0 10px 30px -5px rgba(0, 0, 0, 0.65), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
    --scrim: rgba(0, 0, 0, 0.6);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #000000;
    color: var(--fg);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #fluid {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    display: block;
  }
  @media (prefers-reduced-motion: reduce) {
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(42% 36% at 16% 20%, rgba(255, 0, 128, .30), transparent 70%),
        radial-gradient(44% 38% at 84% 26%, rgba(0, 200, 255, .28), transparent 70%),
        radial-gradient(46% 40% at 28% 84%, rgba(80, 255, 120, .22), transparent 70%),
        radial-gradient(40% 34% at 76% 78%, rgba(255, 180, 0, .25), transparent 70%);
    }
  }

  /* ============ Landing hero ============ */
  .stage {
    position: relative; z-index: 10;
    width: 100vw; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 24px calc(24px + 6vh);
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .stage a, .stage button, .stage input, .stage img { pointer-events: auto; }
  body.chat .stage { opacity: 0; visibility: hidden; pointer-events: none; }

  .hello {
    font-size: 1.45rem; font-weight: 700;
    margin: 0 0 0.4rem;
    text-align: center;
    text-shadow: 0 1px 12px rgba(0, 0, 0, 0.8);
    animation: rise .5s ease both;
  }
  h1.headline {
    margin: 0;
    font-size: clamp(2.1rem, 6vw, 3.7rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1.1;
    text-align: center;
    text-wrap: balance;
    text-shadow: 0 2px 24px rgba(0, 0, 0, 0.85);
    animation: rise .5s .08s ease both;
  }
  .avatar {
    width: clamp(160px, 29vh, 240px); height: clamp(160px, 29vh, 240px);
    border-radius: 2rem;
    overflow: hidden;
    box-shadow: var(--shadow-img);
    margin: 2.75rem 0 1.5rem;
    animation: rise .5s .16s ease both;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transform: scale(1.18);
    transform-origin: 50% 30%;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .askwrap {
    position: relative;
    max-width: 500px; width: 100%;
    margin: 0 auto;
    animation: rise .5s .24s ease both;
  }
  .askwrap input {
    width: 100%;
    padding: 1rem 3.5rem 1rem 1.5rem;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: var(--glass);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    color: var(--fg);
    font: inherit; font-size: 1rem;
    box-shadow: var(--shadow-sm);
    outline: none;
  }
  .askwrap input::placeholder { color: var(--placeholder); }
  .askwrap input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .askwrap .send {
    position: absolute; right: 0.5rem; top: 50%;
    transform: translateY(-50%);
    width: 2.5rem; height: 2.5rem;
    border-radius: 50%;
    border: 0;
    background: var(--accent);
    color: #14100A;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform .2s ease-in-out;
  }
  .askwrap .send:hover { transform: translateY(-50%) scale(1.07); }
  .askwrap .send:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .quick {
    display: flex; gap: 13px;
    justify-content: center; flex-wrap: wrap;
    margin-top: 1.4rem;
    animation: rise .5s .3s ease both;
  }
  .quick button {
    width: 126px; height: 94px;
    background: var(--glass);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.55rem;
    font: inherit; font-size: 0.875rem; font-weight: 500;
    color: var(--fg);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease-in-out;
  }
  .quick button:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border); }
  .quick button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .quick svg { width: 18px; height: 18px; stroke: var(--accent); }

  @media (max-height: 760px) {
    .avatar { margin: 1.1rem 0; }
    h1.headline { font-size: clamp(1.7rem, 5.5vw, 2.6rem); }
    .quick { margin-top: 1rem; }
    .quick button { width: 96px; height: 74px; font-size: 0.75rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hello, .avatar, h1.headline, .askwrap, .quick { animation: none !important; }
    .stage, .chatview { transition: none !important; }
  }

  /* ============ Corner elements ============ */
  .corner-info {
    position: fixed; top: 2rem; right: 2.6rem; z-index: 60;
    width: 2.4rem; height: 2.4rem;
    border-radius: 50%;
    border: 0; background: transparent;
    color: var(--fg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: .85;
  }
  .corner-info:hover { opacity: 1; }
  .corner-info:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .corner-info svg { width: 24px; height: 24px; }

  /* ============ Chat view ============ */
  .chatview {
    position: fixed; inset: 0; z-index: 40;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; visibility: hidden;
    transform: translateY(24px);
    transition: opacity .3s ease, transform .3s ease, visibility .3s;
  }
  body.chat .chatview { opacity: 1; visibility: visible; transform: none; }

  .chat-top { flex: none; padding: 0.7rem 0 0.3rem; }
  .chat-top button {
    border: 0; background: transparent; padding: 0; cursor: pointer;
    border-radius: 0.9rem;
  }
  .chat-top button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .chat-top img {
    width: 46px; height: 46px;
    border-radius: 0.8rem;
    object-fit: cover; display: block;
    box-shadow: var(--shadow-sm);
  }

  .feed {
    flex: 1; width: 100%;
    overflow-y: auto;
    padding: 1rem 1.4rem 1.5rem;
  }
  .answer { max-width: 720px; margin: 0 auto; animation: rise .3s ease both; }
  .bubble-user {
    display: table;
    margin: 0 0 1.1rem auto;
    background: var(--accent); color: #14100A;
    padding: 8px 16px;
    border-radius: 18px 18px 4px 18px;
    font-size: 15px; max-width: 80%;
    box-shadow: var(--shadow-sm);
  }
  .answer h2 {
    margin: 0.2rem 0 1rem;
    font-size: 2rem; font-weight: 800; letter-spacing: -0.03em;
  }
  .answer .convo { color: var(--fg); font-size: 15.5px; line-height: 1.6; margin: 1.2rem 0 0; }
  .answer .muted { color: var(--muted-fg); }

  .cat { display: flex; align-items: center; gap: 8px; margin: 1.4rem 0 0.6rem; }
  .cat svg { width: 18px; height: 18px; stroke: var(--accent); flex: none; }
  .cat h3 { margin: 0; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; }

  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill-d {
    font-size: 13px; font-weight: 500;
    background: var(--tag-bg); color: var(--fg);
    border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 9999px;
  }
  .pill-g {
    font-size: 13px; font-weight: 500;
    background: var(--accent-soft); color: var(--fg);
    padding: 4px 12px; border-radius: 9999px;
  }

  .gcard {
    background: var(--card);
    border-radius: 1.25rem;
    padding: 1.6rem 1.8rem;
  }
  .gcard-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .gcard-head h2 { margin: 0; }
  .gcard-head .handle { color: var(--muted-fg); font-size: 14px; }
  .crow {
    display: flex; align-items: center; gap: 12px;
    margin: 0.9rem 0; font-size: 16px;
  }
  .crow svg { width: 19px; height: 19px; stroke: var(--muted-fg); flex: none; }
  .crow a { color: var(--link); text-decoration: none; }
  .crow a:hover { text-decoration: underline; }
  .linkrow { display: flex; gap: 1.6rem; flex-wrap: wrap; margin-top: 1.1rem; }
  .linkrow a { color: var(--fg); font-size: 15px; font-weight: 500; text-decoration: none; }
  .linkrow a:hover { color: var(--link); }

  .proj { padding: 1rem 0 0.4rem; }
  .proj-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .proj-head h3 { margin: 0; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; }
  .proj-head .date { font-size: 13px; color: var(--muted-fg); }
  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-soft);
    padding: 2px 9px; border-radius: 9999px;
  }
  .proj p { margin: 0.5rem 0 0.8rem; color: var(--muted-fg); font-size: 15px; line-height: 1.6; }

  .mapcard {
    margin-top: 1rem; height: 290px; border-radius: 1rem; overflow: hidden;
    border: 1px solid var(--border);
    background: var(--card);
    position: relative;
  }
  .mapcard { display: flex; align-items: center; justify-content: center; }
  .mapcard canvas { width: 260px; height: 260px; max-width: 90%; }
  .mapcard .geo {
    position: absolute; left: 14px; bottom: 10px;
    font-size: 12.5px; color: var(--muted-fg); letter-spacing: .02em;
  }
  .pin-pulse { animation: pinpulse 2.4s ease-out infinite; }
  @keyframes pinpulse {
    0% { r: 8; opacity: 0.6; }
    100% { r: 18; opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) { .pin-pulse { animation: none; opacity: 0.4; } }

  .chat-dock {
    flex: none; width: 100%;
    padding: 0.4rem 1.4rem 0.5rem;
    display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
  }
  .quickrow { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .quickrow button {
    display: inline-flex; align-items: center; gap: 6px;
    font: inherit; font-size: 0.8rem; font-weight: 500;
    color: var(--fg);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 5px 13px;
    cursor: pointer;
    transition: all .15s ease-in-out;
  }
  .quickrow button:hover { border-color: var(--accent); background: var(--accent-soft); }
  .quickrow button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .quickrow svg { width: 14px; height: 14px; stroke: var(--accent); }
  .chat-dock .askwrap { animation: none; }

  .handlebar {
    border: 0; background: transparent; cursor: pointer;
    padding: 0.15rem 1rem 0.5rem;
  }
  .handlebar span {
    display: block;
    width: 2.5rem; height: 0.25rem;
    border-radius: 9999px;
    background: var(--handle);
  }
  .handlebar:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .drawer-hint {
    position: fixed; bottom: 0.85rem; left: 50%; z-index: 20;
    transform: translateX(-50%);
  }

  /* ============ Info modal ============ */
  .modal {
    position: fixed; inset: 0; z-index: 70;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
    background: var(--scrim);
  }
  body.modal-open .modal { display: flex; }
  .modal-card {
    max-width: 560px; width: 100%;
    background: #FFFFFF;
    border-radius: 1.1rem;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    padding: 2.5rem 2.6rem 2.3rem;
    position: relative;
    text-align: left;
  }
  .modal-card h2 {
    margin: 0 0 1.1rem; color: #000000;
    font-size: 1.7rem; font-weight: 700; letter-spacing: -0.02em;
  }
  .modal-card p {
    margin: 0 0 1.7rem; color: #6B7280;
    font-size: 1.08rem; line-height: 1.65;
  }
  .modal-x {
    position: absolute; top: 1.6rem; right: 1.6rem;
    width: 2.3rem; height: 2.3rem;
    border-radius: 50%; border: 0;
    background: #000000; color: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .modal-x svg { width: 16px; height: 16px; }
  .modal-x:focus-visible, .modal-cta:focus-visible { outline: 2px solid #C7A24C; outline-offset: 2px; }
  .modal-cta {
    display: block; margin: 0 auto;
    background: #C7A24C; color: #FFFFFF;
    border: 0; border-radius: 9999px;
    padding: 0.75rem 2rem;
    font: inherit; font-size: 1.05rem; font-weight: 600;
    cursor: pointer;
    transition: filter .15s ease;
  }
  .modal-cta:hover { filter: brightness(1.07); }

  .thinking::after { content: ""; animation: dots 1.2s steps(4) infinite; }
  @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }
</style>
</head>

<script type="module">
import createGlobe from "./globe.js";
let globe = null;
window.initGlobe = function () {
  if (globe) { globe.destroy(); globe = null; }
  const canvas = document.getElementById("globe");
  if (!canvas) return;
  const side = Math.min(260, canvas.parentElement.clientWidth * 0.9);
  canvas.style.width = side + "px";
  canvas.style.height = side + "px";
  // phi that faces Tallahassee (long -84.28): PI - long in radians
  let phi = Math.PI - (-84.2807 * Math.PI) / 180 + 1.1;
  globe = createGlobe(canvas, {
    devicePixelRatio: 2,
    width: side * 2,
    height: side * 2,
    phi: phi,
    theta: 0.42,
    dark: 1,
    diffuse: 1.2,
    mapSamples: 20000,
    mapBrightness: 8,
    baseColor: [0.36, 0.33, 0.27],
    markerColor: [0.9, 0.76, 0.5],
    glowColor: [0.35, 0.3, 0.22],
    markers: [{ location: [30.4383, -84.2807], size: 0.1 }],
    onRender: (state) => {
      state.phi = phi;
      phi += 0.0012;
    }
  });
};
</script>

<script>
(function () {
  "use strict";
  if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
    WebGLFluid(document.getElementById("fluid"), {

    },
    contact: {
      q: "How can I reach you?",
      html: '<div class="gcard">' +
        '<div class="gcard-head"><h2 style="margin:0">Contact Information</h2><span class="handle">@Jfraile05</span></div>' +
        '<div class="crow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg><a href="mailto:Jorge@JorgeFraile.com">Jorge@JorgeFraile.com</a></div>' +
        '<div class="crow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>305-798-5261</span></div>' +

      html: '<h2>Location</h2>' +
        '<p style="margin:0;font-size:1.1rem;font-weight:600">Tallahassee, Florida, United States</p>' +
        '<div class="mapcard"><canvas id="globe"></canvas><span class="geo">Tallahassee · 30.44° N, 84.28° W</span></div>' +
        '<p class="convo">I\'m based in Tallahassee, Florida, home of Florida State University. Open to remote work and relocation. Have you ever been down here?</p>'
    }
  };

  var routes = [
    [/project|built|build|portfolio|smartgallery|nolequest|work/i, "projects"],
    [/skill|stack|tech|know|language/i, "skills"],
    [/contact|reach|email|phone|hire|linkedin|github|resume/i, "contact"],
    [/where|location|based|live|city/i, "location"],
    [/./, "me"]
  ];

  var feed = document.getElementById("feed");

  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function enterChat() { document.body.classList.add("chat"); }
  function exitChat() { document.body.classList.remove("chat"); }

  function answer(tool, question) {
    var def = cards[tool];
    feed.innerHTML = '<div class="answer"><div class="bubble-user">' + esc(question || def.q) + "</div>" + def.html + "</div>";
    enterChat();
    feed.scrollTop = 0;
    if (tool === "location" && window.initGlobe) window.initGlobe();
  }

  /* ============ Live chat (OpenRouter via /api/chat) ============ */

  var history = [];

  function askLLM(text) {
    history.push({ role: "user", content: text });
    if (history.length > 8) history = history.slice(-8);
    feed.innerHTML = '<div class="answer"><div class="bubble-user">' + esc(text) +
      '</div><p class="convo" id="llm-reply"><span class="thinking">Thinking</span></p></div>';
    enterChat();
    feed.scrollTop = 0;
    var target = document.getElementById("llm-reply");

    fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    }).then(function (r) {
      return r.json().then(function (j) { return { ok: r.ok, status: r.status, j: j }; });
    }).then(function (res) {
      if (res.status === 429) {
        typeOut(target, "You're asking faster than I can keep up 😅 Give it a minute and ask again, or use the shortcut buttons below.");
        history.pop();
        return;
      }
      if (!res.ok || !res.j.reply) throw new Error(res.j.error || "no reply");
      var reply = res.j.reply.replace(/\*\*(.+?)\*\*/g, "$1").replace(/\*(.+?)\*/g, "$1");
      history.push({ role: "assistant", content: reply });
      typeOut(target, reply);
    }).catch(function () {
      var tool = routeFor(text);
      var def = cards[tool];
      feed.innerHTML = '<div class="answer"><div class="bubble-user">' + esc(text) + "</div>" + def.html + "</div>";
      feed.scrollTop = 0;
    });
  }

  function typeOut(el, text) {
    var i = 0;
    el.textContent = "";
    var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduced) { el.textContent = text; return; }
    (function tick() {
      i = Math.min(i + 3, text.length);
      el.textContent = text.slice(0, i);
      if (i < text.length) requestAnimationFrame(tick);
    })();
  }

  function routeFor(text) {
    for (var i = 0; i < routes.length; i++) {
      if (routes[i][0].test(text)) return routes[i][1];
    }
    return "me";
  }

  function handleSubmit(inputEl) {
    return function (e) {
      e.preventDefault();
      var text = inputEl.value.trim();
      if (!text) return;
      askLLM(text);
      inputEl.value = "";
    };
  }

  document.getElementById("askform").addEventListener("submit", handleSubmit(document.getElementById("ask")));
  document.getElementById("askform2").addEventListener("submit", handleSubmit(document.getElementById("ask2")));

  document.querySelectorAll("[data-tool]").forEach(function (btn) {
    btn.addEventListener("click", function () { answer(btn.dataset.tool); });
  });

  document.getElementById("drawerhint").addEventListener("click", function () { answer("me"); });
  document.getElementById("closechat").addEventListener("click", exitChat);
  document.getElementById("backhome").addEventListener("click", exitChat);

  var modal = document.getElementById("modal");

  });
  document.getElementById("modalclose").addEventListener("click", function () {
    document.body.classList.remove("modal-open");
  });
  document.getElementById("startchat").addEventListener("click", function () {
    document.body.classList.remove("modal-open");
    var input = document.body.classList.contains("chat") ? document.getElementById("ask2") : document.getElementById("ask");

  });
  window.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (document.body.classList.contains("modal-open")) document.body.classList.remove("modal-open");
      else exitChat();
    }
  });
})();

</script>
