<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jorge Fraile Perez</title>
  <meta name="description" content="Jorge Fraile Perez. Founding Engineer at Drafted Labs, AWS Student Builder Campus Leader, and CS student at Florida State University. Ask me anything." />
  <link rel="icon" href="favicon-32.png?v=2" type="image/png" />
  <link rel="icon" href="favicon.svg?v=2" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2" />
  <style>
  /* Committed dark design: the neon fluid needs a black ground */
  :root {
    --bg: #050507;
    --fg: #F4F4F5;
    --card: #16161B;
    --glass: rgba(16, 16, 21, 0.55);
    --border: #2A2A31;
    --border-soft: #232329;
    --muted-fg: #A1A1AA;
    --placeholder: #71717A;
    --accent: #D4B886;
    --accent-soft: #2B2517;
    --tag-bg: #26262C;
    --handle: #3F3F46;
    --link: #D4B886;
    --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.45);
    --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.55);
    --shadow-img: 0 10px 30px -5px rgba(0, 0, 0, 0.65), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
    --scrim: rgba(0, 0, 0, 0.6);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #000000;
    color: var(--fg);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #fluid {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    display: block;
  }
  @media (prefers-reduced-motion: reduce) {
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(42% 36% at 16% 20%, rgba(255, 0, 128, .30), transparent 70%),
        radial-gradient(44% 38% at 84% 26%, rgba(0, 200, 255, .28), transparent 70%),
        radial-gradient(46% 40% at 28% 84%, rgba(80, 255, 120, .22), transparent 70%),
        radial-gradient(40% 34% at 76% 78%, rgba(255, 180, 0, .25), transparent 70%);
    }
  }

  /* ============ Landing hero ============ */
  .stage {
    position: relative; z-index: 10;
    width: 100vw; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 24px calc(24px + 6vh);
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .stage a, .stage button, .stage input, .stage img { pointer-events: auto; }
  body.chat .stage { opacity: 0; visibility: hidden; pointer-events: none; }

  .hello {
    font-size: 1.45rem; font-weight: 700;
    margin: 0 0 0.4rem;
    text-align: center;
    text-shadow: 0 1px 12px rgba(0, 0, 0, 0.8);
    animation: blurIn .55s ease both;
  }
  .hello .wave {
    display: inline-block;
    animation: wave 1.1s ease .9s both;
    transform-origin: 70% 80%;
  }
  @keyframes blurIn {
    from { opacity: 0; filter: blur(10px); transform: translateY(10px); }
    to { opacity: 1; filter: blur(0); transform: none; }
  }
  @keyframes wave {
    0%, 100% { transform: rotate(0); }
    20% { transform: rotate(22deg); }
    45% { transform: rotate(-10deg); }
    70% { transform: rotate(14deg); }
  }
  h1.headline {
    margin: 0;
    font-size: clamp(2.2rem, 4vw, 4.8rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1.1;
    text-align: center;
    text-wrap: balance;
    text-shadow: 0 2px 24px rgba(0, 0, 0, 0.85);
  }
  .headline .w { display: inline-block; vertical-align: bottom; }
  .headline .wi {
    display: inline-block;
    animation: blurIn .55s ease both;
  }
  .headline .w:nth-child(1) .wi { animation-delay: .22s; }
  .headline .w:nth-child(2) .wi { animation-delay: .29s; }
  .headline .w:nth-child(3) .wi { animation-delay: .36s; }
  .headline .w:nth-child(4) .wi { animation-delay: .43s; }
  .headline .w:nth-child(5) .wi { animation-delay: .50s; }
  .headline .w:nth-child(6) .wi { animation-delay: .57s; }
  .headline .w:nth-child(7) .wi { animation-delay: .64s; }
  .avatar {
    width: clamp(160px, 29vh, 240px); height: clamp(160px, 29vh, 240px);
    border-radius: 2rem;
    overflow: hidden;
    box-shadow: var(--shadow-img);
    margin: 2.75rem 0 1.5rem;
    animation: avatarIn .6s cubic-bezier(.34, 1.4, .5, 1) .5s both,
               ripple 1s ease 1.15s both;
  }
  @keyframes avatarIn {
    from { opacity: 0; transform: scale(.82); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes ripple {
    from { box-shadow: 0 0 0 0 rgba(212, 184, 134, .5), var(--shadow-img); }
    to { box-shadow: 0 0 0 34px rgba(212, 184, 134, 0), var(--shadow-img); }
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transform: scale(1.18);
    transform-origin: 50% 30%;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .askwrap {
    position: relative;
    max-width: 500px; width: 100%;
    margin: 0 auto;
    animation: barReveal .6s cubic-bezier(.25, .8, .3, 1) .85s both;
  }
  @keyframes barReveal {
    from { opacity: 0; clip-path: inset(0 44% 0 44% round 9999px); }
    35% { opacity: 1; }
    to { opacity: 1; clip-path: inset(0 0 0 0 round 9999px); }
  }
  .askwrap input {
    width: 100%;
    padding: 1rem 3.5rem 1rem 1.5rem;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: var(--glass);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    color: var(--fg);
    font: inherit; font-size: 1rem;
    box-shadow: var(--shadow-sm);
    outline: none;
  }
  .askwrap input::placeholder { color: var(--placeholder); }
  .askwrap input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .askwrap .send {
    position: absolute; right: 0.5rem; top: 50%;
    transform: translateY(-50%);
    width: 2.5rem; height: 2.5rem;
    border-radius: 50%;
    border: 0;
    background: var(--accent);
    color: #14100A;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform .2s ease-in-out;
    animation: sendPop .5s cubic-bezier(.34, 1.56, .64, 1) 1.3s both;
  }
  @keyframes sendPop {
    from { opacity: 0; transform: translateY(-50%) scale(0); }
    to { opacity: 1; transform: translateY(-50%) scale(1); }
  }
  .askwrap .send:hover { transform: translateY(-50%) scale(1.07); }
  .askwrap .send:active { transform: translateY(-50%) scale(.92); }
  .askwrap .send:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .quick {
    display: flex; gap: 13px;
    justify-content: center; flex-wrap: wrap;
    margin-top: 1.4rem;
  }
  .quick button { animation: cardIn .55s cubic-bezier(.34, 1.56, .64, 1) both; }
  .quick button:nth-child(1) { animation-delay: 1.15s; }
  .quick button:nth-child(2) { animation-delay: 1.23s; }
  .quick button:nth-child(3) { animation-delay: 1.31s; }
  .quick button:nth-child(4) { animation-delay: 1.39s; }
  .quick button:nth-child(5) { animation-delay: 1.47s; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(.88); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .quick button {
    width: 126px; height: 94px;
    background: var(--glass);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.55rem;
    font: inherit; font-size: 0.875rem; font-weight: 500;
    color: var(--fg);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease-in-out;
  }
  .quick button:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border); }
  .quick button:active { transform: translateY(0) scale(.95); }
  .quick button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .quick svg { width: 18px; height: 18px; stroke: var(--accent); }

  @media (max-width: 720px) {
    .stage { padding: 16px 16px calc(16px + 3vh); }
    .hello { font-size: 1.15rem; }
    h1.headline { font-size: clamp(1.9rem, 7.6vw, 3.2rem); }
    .avatar {
      width: clamp(130px, 19vh, 165px); height: clamp(130px, 19vh, 165px);
      border-radius: 1.6rem;
      margin: 1.5rem 0 1.2rem;
    }
    .askwrap input { padding: 0.85rem 3.3rem 0.85rem 1.2rem; }
    .askwrap .send { width: 2.3rem; height: 2.3rem; }
    .quick { gap: 9px; margin-top: 1.2rem; }
    .quick button { width: 102px; height: 80px; font-size: 0.78rem; gap: 0.4rem; border-radius: 12px; }
    .quick svg { width: 16px; height: 16px; }
    .corner-info { top: 0.8rem; right: 0.8rem; }
    .feed { padding: 0.8rem 1rem 1rem; }
    .answer h2 { font-size: 1.5rem; }
    .gcard { padding: 1.25rem 1.3rem; }
    .gcard-head h2 { font-size: 1.3rem; }
    .crow { font-size: 14.5px; word-break: break-all; }
    .mapcard { height: 300px; }
    .mapcard canvas { width: 240px; height: 240px; }
    .chat-dock { padding: 0.3rem 0.9rem 0.4rem; }
    .quickrow { gap: 6px; }
    .quickrow button { font-size: 0.72rem; padding: 4px 10px; }
    .modal-card { padding: 1.8rem 1.4rem 1.6rem; }
    .modal-card h2 { font-size: 1.35rem; }
    .modal-card p { font-size: 0.98rem; }
    .modal-x { top: 1.1rem; right: 1.1rem; width: 2rem; height: 2rem; }
  }
  @media (max-height: 640px) {
    .avatar { margin: 1rem 0; }
    .quick { margin-top: 1rem; }
    .quick button { width: 112px; height: 84px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hello, .hello .wave, .avatar, .headline .wi, .askwrap, .askwrap .send, .quick button { animation: none !important; }
    .stage, .chatview { transition: none !important; }
  }

  /* ============ Corner elements ============ */
  .corner-info {
    position: fixed; top: 2rem; right: 2.6rem; z-index: 60;
    width: 2.4rem; height: 2.4rem;
    border-radius: 50%;
    border: 0; background: transparent;
    color: var(--fg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: .85;
  }
  .corner-info:hover { opacity: 1; }
  .corner-info:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .corner-info svg { width: 24px; height: 24px; }

  /* ============ Chat view ============ */
  .chatview {
    position: fixed; inset: 0; z-index: 40;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; visibility: hidden;
    transform: translateY(24px);
    transition: opacity .3s ease, transform .3s ease, visibility .3s;
  }
  body.chat .chatview { opacity: 1; visibility: visible; transform: none; }

  .chat-top { flex: none; padding: 0.7rem 0 0.3rem; }
  .chat-top button {
    border: 0; background: transparent; padding: 0; cursor: pointer;
    border-radius: 0.9rem;
  }
  .chat-top button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .chat-top img {
    width: 46px; height: 46px;
    border-radius: 0.8rem;
    object-fit: cover; display: block;
    box-shadow: var(--shadow-sm);
  }

  .feed {
    flex: 1; width: 100%;
    overflow-y: auto;
    padding: 1rem 1.4rem 1.5rem;
  }
  .answer { max-width: 720px; margin: 0 auto 1.8rem; animation: rise .3s ease both; }
  .bubble-user {
    display: table;
    margin: 0 0 1.1rem auto;
    background: var(--accent); color: #14100A;
    padding: 8px 16px;
    border-radius: 18px 18px 4px 18px;
    font-size: 15px; max-width: 80%;
    box-shadow: var(--shadow-sm);
  }
  .answer h2 {
    margin: 0.2rem 0 1rem;
    font-size: 2rem; font-weight: 800; letter-spacing: -0.03em;
  }
  .answer .convo { color: var(--fg); font-size: 15.5px; line-height: 1.6; margin: 1.2rem 0 0; }
  .answer .muted { color: var(--muted-fg); }

  .cat { display: flex; align-items: center; gap: 8px; margin: 1.4rem 0 0.6rem; }
  .cat svg { width: 18px; height: 18px; stroke: var(--accent); flex: none; }
  .cat h3 { margin: 0; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; }

  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill-d {
    font-size: 13px; font-weight: 500;
    background: var(--tag-bg); color: var(--fg);
    border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 9999px;
  }
  .pill-g {
    font-size: 13px; font-weight: 500;
    background: var(--accent-soft); color: var(--fg);
    padding: 4px 12px; border-radius: 9999px;
  }

  .gcard {
    background: var(--card);
    border-radius: 1.25rem;
    padding: 1.6rem 1.8rem;
  }
  .gcard-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .gcard-head h2 { margin: 0; }
  .gcard-head .handle { color: var(--muted-fg); font-size: 14px; }
  .crow {
    display: flex; align-items: center; gap: 12px;
    margin: 0.9rem 0; font-size: 16px;
  }
  .crow svg { width: 19px; height: 19px; stroke: var(--muted-fg); flex: none; }
  .crow a { color: var(--link); text-decoration: none; }
  .crow a:hover { text-decoration: underline; }
  .linkrow { display: flex; gap: 1.6rem; flex-wrap: wrap; margin-top: 1.1rem; }
  .contact-form { margin-top: 1.5rem; padding-top: 1.3rem; border-top: 1px solid var(--border); }
  .contact-form h3 { margin: 0 0 0.9rem; font-size: 1.05rem; font-weight: 700; }
  .cf-row { display: flex; gap: 10px; }
  .cf-row .cf-field { flex: 1; }
  .cf-field { margin-bottom: 10px; min-width: 0; }
  .cf-field label {
    display: block; margin-bottom: 5px;
    font-size: 12px; font-weight: 600; letter-spacing: .04em;
    color: var(--muted-fg); text-transform: uppercase;
  }
  .cf-field input, .cf-field textarea {
    width: 100%;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg);
    font: inherit; font-size: 15px;
    padding: 10px 12px;
    outline: none;
  }
  .cf-field input::placeholder, .cf-field textarea::placeholder { color: var(--placeholder); }
  .cf-field input:focus-visible, .cf-field textarea:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  .cf-field textarea { min-height: 96px; resize: vertical; }
  .cf-send {
    background: var(--accent); color: #14100A;
    border: 0; border-radius: 9999px;
    padding: 0.6rem 1.6rem;
    font: inherit; font-size: 0.95rem; font-weight: 600;
    cursor: pointer;
    transition: filter .15s ease, transform .12s ease;
  }
  .cf-send:hover { filter: brightness(1.08); }
  .cf-send:active { transform: scale(.96); }
  .cf-send:disabled { opacity: .6; cursor: default; }
  .cf-send:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .intro-card { margin: 0; }
  .intro-card .cf-send { margin-right: 4px; }
  .cf-skip {
    background: none; border: 0;
    color: var(--muted-fg);
    font: inherit; font-size: 0.9rem;
    cursor: pointer;
    padding: 0.6rem 0.9rem;
  }
  .cf-skip:hover { color: var(--fg); }
  .cf-skip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 9999px; }
  .cf-status { margin: 0.7rem 0 0; font-size: 14px; display: none; }
  .cf-status.ok { color: #8FCF9B; display: block; }
  .cf-status.err { color: #E08A8A; display: block; }
  @media (max-width: 720px) { .cf-row { flex-direction: column; gap: 0; } }
  .linkrow a { color: var(--fg); font-size: 15px; font-weight: 500; text-decoration: none; }
  .linkrow a:hover { color: var(--link); }

  .proj { padding: 1rem 0 0.4rem; }
  .proj-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .proj-head h3 { margin: 0; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; }
  .proj-head .date { font-size: 13px; color: var(--muted-fg); }
  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-soft);
    padding: 2px 9px; border-radius: 9999px;
  }
  .proj p { margin: 0.5rem 0 0.8rem; color: var(--muted-fg); font-size: 15px; line-height: 1.6; }

  .mapcard {
    margin-top: 1rem; height: 360px; border-radius: 1rem; overflow: hidden;
    border: 1px solid var(--border);
    background:
      radial-gradient(90% 90% at 70% 20%, rgba(90, 70, 140, 0.12), transparent 60%),
      radial-gradient(80% 80% at 25% 80%, rgba(190, 150, 70, 0.08), transparent 60%),
      radial-gradient(ellipse at 50% 45%, #0C0C14, #030308);
    position: relative;
  }
  .mapcard { display: flex; align-items: center; justify-content: center; }
  .mapcard canvas {
    width: 340px; height: 340px; max-width: 92%;
    position: relative; z-index: 2;
    cursor: grab;
    touch-action: none;
  }
  .mapcard canvas:active { cursor: grabbing; }
  .stars {
    position: absolute; top: 0; left: 0;
    width: 2px; height: 2px; border-radius: 50%;
    background: transparent;
    z-index: 1; pointer-events: none;
  }
  .stars.twinkle { animation: twinkle 4s ease-in-out infinite alternate; }
  .pin3d {
    position: absolute; top: 0; left: 0; z-index: 3;
    pointer-events: none;
    transition: opacity .25s ease;
    will-change: transform;
  }
  .pin-svg {
    display: block;
    width: 11px; height: 17px;
    margin-left: -5.5px; margin-top: -17px;
    filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.6));
    animation: pinDrop .55s cubic-bezier(.34, 1.56, .64, 1) .35s both,
               pinBob 2.6s ease-in-out 1s infinite;
  }
  .pin-ring {
    position: absolute; left: 0; top: 0;
    width: 11px; height: 5px;
    margin-left: -5.5px; margin-top: -2.5px;
    border: 1.5px solid rgba(230, 59, 46, 0.75);
    border-radius: 50%;
    animation: pinPulse 2s ease-out .9s infinite;
  }
  .pin-label {
    position: absolute; left: 0; top: -33px;
    transform: translateX(-50%);
    font-size: 10px; font-weight: 600; letter-spacing: .03em;
    color: #FFD98A;
    background: rgba(5, 5, 10, 0.72);
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid rgba(242, 204, 118, 0.3);
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
    white-space: nowrap;
    animation: pinDrop .55s cubic-bezier(.34, 1.56, .64, 1) .45s both;
  }
  .pin-mini .mini-dot {
    position: absolute; left: 0; top: 0;
    width: 5px; height: 5px;
    margin-left: -2.5px; margin-top: -2.5px;
    border-radius: 50%;
    background: #F2CC76;
    box-shadow: 0 0 6px rgba(242, 204, 118, 0.9);
    animation: pinDrop .55s cubic-bezier(.34, 1.56, .64, 1) .45s both;
  }
  .pin-mini .pin-label {
    top: 6px;
    font-size: 9px;
  }
  @keyframes pinDrop {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pinBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2.5px); }
  }
  @keyframes pinPulse {
    from { opacity: .9; transform: scale(.4); }
    to { opacity: 0; transform: scale(2.1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .pin-svg, .pin-ring, .pin-label, .pin-mini .mini-dot { animation: none; opacity: 1; }
    .pin-ring { opacity: .5; }
  }
  @keyframes twinkle { from { opacity: 0.35; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .stars.twinkle { animation: none; } }
  .pin-pulse { animation: pinpulse 2.4s ease-out infinite; }
  @keyframes pinpulse {
    0% { r: 8; opacity: 0.6; }
    100% { r: 18; opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) { .pin-pulse { animation: none; opacity: 0.4; } }

  .chat-dock {
    flex: none; width: 100%;
    padding: 0.4rem 1.4rem 0.5rem;
    display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
  }
  .quickrow { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .quickrow button {
    display: inline-flex; align-items: center; gap: 6px;
    font: inherit; font-size: 0.8rem; font-weight: 500;
    color: var(--fg);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 5px 13px;
    cursor: pointer;
    transition: all .15s ease-in-out;
  }
  .quickrow button:hover { border-color: var(--accent); background: var(--accent-soft); }
  .quickrow button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

<script type="module">
import createGlobe from "./globe.js";
let globe = null;
window.initGlobe = function () {
  if (globe) { globe.destroy(); globe = null; }
  const canvas = document.getElementById("globe");
  if (!canvas) return;

  const card = canvas.parentElement;
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // starfield: two depth layers of randomly placed dots
  [["stars1", 70, 0.55], ["stars2", 45, 0.95]].forEach(function (layer) {
    const el = document.getElementById(layer[0]);
    if (!el) return;
    const w = card.clientWidth, h = card.clientHeight;
    const shadows = [];
    for (let i = 0; i < layer[1]; i++) {
      shadows.push(
        (Math.random() * w).toFixed(0) + "px " +
        (Math.random() * h).toFixed(0) + "px " +
        (Math.random() < 0.2 ? "1px " : "0 ") +
        "rgba(255,255,255," + (layer[2] * (0.5 + Math.random() * 0.5)).toFixed(2) + ")"
      );
    }
    el.style.boxShadow = shadows.join(", ");
  });

  const side = Math.min(340, card.clientWidth * 0.92);
  const ZOOM = 1.2;
  canvas.style.width = side + "px";
  canvas.style.height = side + "px";

  // phi that faces Tallahassee (long -84.28): PI - long in radians
  let phi = Math.PI - (-84.2807 * Math.PI) / 180 + 1.1;
  let dragging = false;
  let lastX = 0;
  let velocity = 0;

  canvas.addEventListener("pointerdown", function (e) {
    dragging = true;
    lastX = e.clientX;
    velocity = 0;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener("pointermove", function (e) {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    lastX = e.clientX;
    phi += dx * 0.006;
    velocity = dx * 0.006;
  });
  ["pointerup", "pointercancel"].forEach(function (ev) {
    canvas.addEventListener(ev, function () { dragging = false; });
  });

  // project each city onto the screen every frame so the pins ride the
  // globe. Marker model vector and rotation order mirror cobe's shader:
  // M = (-cos(lat)cos(lon - PI), sin(lat), cos(lat)sin(lon - PI)),
  // view = Rx(theta) * Ry(phi) * M.
  const THETA = 0.42;
  const COS_T = Math.cos(THETA), SIN_T = Math.sin(THETA);
  const pins = [
    ["pin3d", 30.4383, -84.2807],
    ["pinMadrid", 40.4168, -3.7038],
    ["pinMiami", 25.7617, -80.1918]
  ].map(function (p) {
    const lat = p[1] * Math.PI / 180;
    const lon = p[2] * Math.PI / 180 - Math.PI;
    return {
      el: document.getElementById(p[0]),
      mx: -Math.cos(lat) * Math.cos(lon),
      my: Math.sin(lat),
      mz: Math.cos(lat) * Math.sin(lon)
    };
  });
  function placePin(phiNow) {
    const cp = Math.cos(phiNow), sp = Math.sin(phiNow);
    const R = side * 0.4 * ZOOM;
    pins.forEach(function (p) {
      if (!p.el) return;
      const vx = cp * p.mx + sp * p.mz;
      const zm = -sp * p.mx + cp * p.mz;
      const vy = COS_T * p.my - SIN_T * zm;
      const vz = SIN_T * p.my + COS_T * zm;
      const px = canvas.offsetLeft + side / 2 + vx * R;
      const py = canvas.offsetTop + side / 2 - vy * R;
      p.el.style.transform = "translate(" + px.toFixed(1) + "px," + py.toFixed(1) + "px)";
      p.el.style.opacity = vz > 0.18 ? "1" : "0";
    });
  }

  globe = createGlobe(canvas, {
    devicePixelRatio: 2,
    width: side * 2,
    height: side * 2,
    phi: phi,
    theta: THETA,
    scale: ZOOM,
    dark: 1,
    diffuse: 1.2,
    mapSamples: 24000,
    mapBrightness: 8,
    baseColor: [0.36, 0.33, 0.27],
    markerColor: [1, 0.82, 0.45],
    glowColor: [0.4, 0.34, 0.24],
    markers: [],
    onRender: function (state) {
      if (!dragging) {
        phi += (reduced ? 0 : 0.0012) + velocity;
        velocity *= 0.94;
      }
      state.phi = phi;
      placePin(phi);
    }
  });
};
</script>

        '<div class="mapcard"><div class="stars" id="stars1"></div><div class="stars twinkle" id="stars2"></div><canvas id="globe"></canvas><div class="pin3d" id="pin3d"><span class="pin-ring"></span><span class="pin-label">Tallahassee</span><svg class="pin-svg" viewBox="0 0 24 36"><path d="M10.9 19 L13.1 19 L12.05 36 Z" fill="#E3E3EA"/><circle cx="12" cy="10.5" r="9.5" fill="#E63B2E"/><circle cx="8.6" cy="7.2" r="2.8" fill="#FF9184" opacity="0.9"/></svg></div><div class="pin3d pin-mini" id="pinMadrid"><span class="mini-dot"></span><span class="pin-label">Madrid · born</span></div><div class="pin3d pin-mini" id="pinMiami"><span class="mini-dot"></span><span class="pin-label">Miami · home</span></div></div>' +
        '<p class="convo">Born in Madrid, home base in Miami, and in Tallahassee for school at Florida State. Open to remote work and relocation. Have you ever been down here?</p>'
    }
  };

  var cardText = {
    me: "I'm Jorge Fraile Perez, a junior at FSU studying Computer Science and Applied Mathematics (Class of 2027, GPA 3.52, Dean's List, HSF Scholar, AWS Certified Cloud Practitioner), based in Tallahassee, Florida. Currently: Founding Engineer at Drafted (since Mar 2026), Co-Founder of Falcon Automatics (since Jan 2025), AWS Student Builder Campus Leader (since Feb 2026), Undergraduate Systems Administrator at FSU CS (since Jan 2026), VP of Administration at ColorStack FSU and Marketing Outreach Chair at ACM.",
    projects: "My main projects: SmartGallery, a serverless image recognition app built with 40 developers across 5 teams in 10 weeks with zero production failures (React, AWS SAM, Lambda, Rekognition, DynamoDB, S3, API Gateway, Cognito). NoleQuest, an AI internship marketplace on Amazon Bedrock with Claude Sonnet. Cloud API, a Python REST API on EC2 with Flask, Gunicorn, and systemd. Plus a C++17 Pokemon battle engine and a C++ banking system on GitHub.",
    skills: "My skills: Programming in Python, C++, C#, Java, SQL, Bash, JavaScript. Cloud and AWS: Lambda, EC2, S3, DynamoDB, API Gateway, IAM, VPC, serverless, CI/CD. Systems: Linux, Windows Server, Active Directory, distributed systems. AI/ML: LLM training and evaluation, fine-tuning, prompt engineering, Amazon Bedrock, Claude. Also React, Node.js, MySQL, SQLite, Git, GitHub, Docker, ServiceNow, SCCM.",
    contact: "You can reach me at Jorge@JorgeFraile.com or 305-798-5261. LinkedIn: linkedin.com/in/jorge-fraile. GitHub: github.com/Jfraile05. My resume is at jorgefraile.com/resume.pdf.",
    location: "Born in Madrid, home base in Miami, and in Tallahassee for school at Florida State. Open to remote work and relocation."
  };

  var routes = [
    [/project|built|build|portfolio|smartgallery|nolequest|work/i, "projects"],
    [/skill|stack|tech|know|language/i, "skills"],
    [/contact|reach|email|phone|hire|linkedin|github|resume/i, "contact"],
    [/where|location|based|live|city/i, "location"],
    [/./, "me"]
  ];

  var feed = document.getElementById("feed");

  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function enterChat() { document.body.classList.add("chat"); }
  function exitChat() { document.body.classList.remove("chat"); }

  function retireIds() {
    ["globe", "pin3d", "pinMadrid", "pinMiami", "stars1", "stars2"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el && feed.contains(el)) el.removeAttribute("id");
    });
  }

  function appendEntry(innerHTML) {
    retireIds();
    var entry = document.createElement("div");
    entry.className = "answer";
    entry.innerHTML = innerHTML;
    feed.appendChild(entry);
    enterChat();
    requestAnimationFrame(function () {
      feed.scrollTop = entry.offsetTop - 10;
    });
    return entry;
  }

  function pushHistory(userText, assistantText) {
    history.push({ role: "user", content: userText }, { role: "assistant", content: assistantText });
    if (history.length > 10) history = history.slice(-10);
  }

  function answer(tool, question) {
    var def = cards[tool];
    appendEntry('<div class="bubble-user">' + esc(question || def.q) + "</div>" + def.html);
    pushHistory(question || def.q, cardText[tool]);
    if (tool === "location" && window.initGlobe) window.initGlobe();
  }

  /* ============ Live chat (OpenRouter via /api/chat) ============ */

  var history = [];
  var visitor = null;
  try { visitor = JSON.parse(sessionStorage.getItem("visitor") || "null"); } catch (e) {}

  function askLLM(text) {
    history.push({ role: "user", content: text });
    if (history.length > 10) history = history.slice(-10);
    var entry = appendEntry('<div class="bubble-user">' + esc(text) +
      '</div><p class="convo"><span class="thinking">Thinking</span></p>');
    var target = entry.querySelector(".convo");

    fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, visitor: visitor })
    }).then(function (r) {
      return r.json().then(function (j) { return { ok: r.ok, status: r.status, j: j }; });
    }).then(function (res) {
      if (res.status === 429) {
        typeOut(target, "You're asking faster than I can keep up 😅 Give it a minute and ask again, or use the shortcut buttons below.");
        history.pop();
        return;
      }
      if (!res.ok || !res.j.reply) throw new Error(res.j.error || "no reply");
      var reply = res.j.reply.replace(/\*\*(.+?)\*\*/g, "$1").replace(/\*(.+?)\*/g, "$1");
      history.push({ role: "assistant", content: reply });
      typeOut(target, reply, maybeOfferIntro);
    }).catch(function () {
      history.pop();
      entry.remove();
      answer(routeFor(text), text);
    });
  }

  function typeOut(el, text, done) {
    var i = 0;
    el.textContent = "";
    var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduced) { el.textContent = text; if (done) done(); return; }
    (function tick() {
      i = Math.min(i + 3, text.length);
      el.textContent = text.slice(0, i);
      if (i < text.length) requestAnimationFrame(tick);
      else if (done) done();
    })();
  }

  /* One-time optional card asking the visitor to introduce themselves. */
  function maybeOfferIntro() {
    if (visitor) return;
    try { if (sessionStorage.getItem("introDone")) return; sessionStorage.setItem("introDone", "1"); } catch (e) {}
    var entry = appendEntry(
      '<form class="intro-card" novalidate>' +
        '<p class="convo" style="margin-top:0">Want me to be able to follow up? Leave your name and email. Totally optional, only used so I can reply. 😊</p>' +
        '<div class="cf-row">' +
          '<div class="cf-field"><label>Name</label><input name="name" type="text" autocomplete="name" /></div>' +
          '<div class="cf-field"><label>Email</label><input name="email" type="email" autocomplete="email" /></div>' +
        '</div>' +
        '<button class="cf-send" type="submit">Share with Jorge</button>' +
        '<button class="cf-skip" type="button">No thanks</button>' +
      '</form>'
    );
    var form = entry.querySelector(".intro-card");
    form.querySelector(".cf-skip").addEventListener("click", function () { entry.remove(); });
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var name = form.querySelector('[name="name"]').value.trim();
      var email = form.querySelector('[name="email"]').value.trim();
      if (!name && !email) { entry.remove(); return; }
      visitor = { name: name, email: email };
      try { sessionStorage.setItem("visitor", JSON.stringify(visitor)); } catch (err) {}
      fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identify: true, visitor: visitor })
      }).catch(function () {});
      form.innerHTML = '<p class="convo" style="margin:0">Thanks' + (name ? ", " + esc(name) : "") + '! 😊</p>';
    });
  }

  function routeFor(text) {
    for (var i = 0; i < routes.length; i++) {
      if (routes[i][0].test(text)) return routes[i][1];
    }
    return "me";
  }

  function handleSubmit(inputEl) {
    return function (e) {
      e.preventDefault();
      var text = inputEl.value.trim();
      if (!text) return;
      askLLM(text);
      inputEl.value = "";
    };
  }

  feed.addEventListener("submit", function (e) {
    var form = e.target.closest && e.target.closest(".contact-form");
    if (!form) return;
    e.preventDefault();
    var name = form.querySelector('[name="name"]').value.trim();
    var email = form.querySelector('[name="email"]').value.trim();
    var message = form.querySelector('[name="message"]').value.trim();
    var btn = form.querySelector(".cf-send");
    var status = form.querySelector(".cf-status");
    if (!name || !email || !message) {
      status.textContent = "Please fill in all three fields.";
      status.className = "cf-status err";
      return;
    }
    btn.disabled = true;
    btn.textContent = "Sending...";
    status.className = "cf-status";
    var fd = new FormData();
    fd.append("name", name);
    fd.append("email", email);
    fd.append("message", message);
    fetch("https://formspree.io/f/xlgovanz", {
      method: "POST",
      headers: { Accept: "application/json" },
      body: fd
    }).then(function (r) {
      if (!r.ok) throw new Error("send failed");
      form.reset();
      btn.style.display = "none";
      status.textContent = "Sent! I'll be in touch soon 😊";
      status.className = "cf-status ok";
    }).catch(function () {
      btn.disabled = false;
      btn.textContent = "Send Message";
      status.textContent = "Something went wrong. Email me directly at Jorge@JorgeFraile.com";
      status.className = "cf-status err";
    });
  });

  document.getElementById("askform").addEventListener("submit", handleSubmit(document.getElementById("ask")));
  document.getElementById("askform2").addEventListener("submit", handleSubmit(document.getElementById("ask2")));

  document.querySelectorAll("[data-tool]").forEach(function (btn) {
    btn.addEventListener("click", function () { answer(btn.dataset.tool); });
  });

  document.querySelectorAll(".quick button, .askwrap .send").forEach(function (el) {
    el.addEventListener("animationend", function () { el.style.animation = "none"; }, { once: true });
  });

  document.getElementById("drawerhint").addEventListener("click", function () {
    if (feed.children.length) enterChat();
    else answer("me");
  });
  document.getElementById("closechat").addEventListener("click", exitChat);
  document.getElementById("backhome").addEventListener("click", exitChat);

  var modal = document.getElementById("modal");
  document.getElementById("infobtn").addEventListener("click", function () {
    document.body.classList.add("modal-open");
  });
  modal.addEventListener("click", function (e) {
    if (e.target === modal) document.body.classList.remove("modal-open");
  });
  document.getElementById("modalclose").addEventListener("click", function () {
    document.body.classList.remove("modal-open");
  });
  document.getElementById("startchat").addEventListener("click", function () {
    document.body.classList.remove("modal-open");
    var input = document.body.classList.contains("chat") ? document.getElementById("ask2") : document.getElementById("ask");
    input.focus();
  });
  var swipeHint = document.getElementById("swipehint");
  if (swipeHint) {
    var hints = [
      "run a finger through the dark",
      "the dark is liquid",
      "touch the void",
      "wake the sleeping colors",
      "disturb the stillness",
      "the night bends to your touch",
      "see what leaks from the black",
      "something glows beneath the black",
      "stir the shadows",
      "the screen remembers your touch",
      "trace a path through the nothing",
      "a spectrum hides in the black",
      "the dark keeps colors. find them",
      "swipe. the void answers",
      "wake the light under the surface",
      "this black is not empty",
      "leave a mark on the dark",
      "the abyss likes to be touched",
      "paint with what hides below",
      "drag the silence around"
    ];
    swipeHint.textContent = hints[Math.floor(Math.random() * hints.length)];
    var hideHint = function () {
      swipeHint.classList.add("gone");
      window.removeEventListener("touchmove", hideHint);
    };
    window.addEventListener("touchmove", hideHint, { passive: true });
  }

  window.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (document.body.classList.contains("modal-open")) document.body.classList.remove("modal-open");
      else exitChat();
    }
  });
})();

</script>
</body>
</html>
